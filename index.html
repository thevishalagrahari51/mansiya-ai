<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA-AI | Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { background: #f8fafc; color: #1e293b; font-family: 'Outfit', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.02); }
        .msg { max-width: 85%; padding: 12px 18px; margin-bottom: 12px; font-size: 14px; border-radius: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: #2563eb; color: white; align-self: flex-end; border-radius: 20px 20px 2px 20px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .ai-msg { background: #f1f5f9; color: #334155; align-self: flex-start; border-radius: 20px 20px 20px 2px; border: 1px solid #e2e8f0; }
        .input-bar { background: white; padding: 15px; border-top: 1px solid #e2e8f0; }
        .box { border: 2px solid #f1f5f9; border-radius: 25px; background: #f8fafc; padding: 4px; transition: 0.3s; }
        .box:focus-within { border-color: #2563eb; background: white; box-shadow: 0 0 15px rgba(37, 99, 235, 0.1); }
        .loader { display: none; font-size: 10px; color: #2563eb; font-weight: bold; text-align: center; margin-bottom: 8px; letter-spacing: 2px; }
        .logout-btn { font-size: 10px; color: #ef4444; cursor: pointer; text-decoration: underline; margin-top: 2px; display: block; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-white border-b border-gray-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-800">MANSIYA<span class="text-blue-600">AI</span></h1>
                <p id="st" class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Active System</p>
            </div>
        </div>
        <div id="u-box" class="text-right">
            <button onclick="doLogin()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-[11px] font-bold shadow-md hover:bg-blue-700 transition">Login</button>
        </div>
    </header>

    <!-- Chat Window -->
    <div id="chat-win" class="chat-area flex flex-col">
        <div class="ai-msg msg">
            <b>MANSIYA Protocol:</b><br>
            Namaste Vishal ji! Main MANSIYA hoon. Sabse pehle login karein taaki main hamari chat history save kar sakoon.
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div id="wait" class="loader uppercase animate-pulse">Mansiya is processing...</div>
        <div class="max-w-4xl mx-auto flex gap-2 box">
            <input type="text" id="u-in" placeholder="Poochiye jo poochna hai..." class="flex-1 p-3 outline-none text-sm bg-transparent">
            <button id="send" class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-blue-700 active:scale-90 transition shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Admin Section -->
    <div id="adm-btn" class="hidden fixed bottom-24 right-6">
        <button onclick="shAdm()" class="bg-red-500 w-14 h-14 rounded-full text-white shadow-2xl border-2 border-white">
            <i class="fas fa-shield-alt text-xl"></i>
        </button>
    </div>

    <div id="adm-pan" class="hidden fixed inset-0 bg-white z-50 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Training Memory Hub</h2>
            <button onclick="shAdm()" class="text-3xl text-gray-400">&times;</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="t-q" placeholder="Enter Question" class="w-full p-4 border rounded-2xl outline-none focus:border-blue-500 bg-gray-50">
            <textarea id="t-a" placeholder="Enter Ideal Answer" class="w-full p-4 border rounded-2xl h-40 outline-none focus:border-blue-500 bg-gray-50"></textarea>
            <button onclick="saveT()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold uppercase shadow-xl">Sikhayein AI ko</button>
        </div>
    </div>

    <script>
        // CONFIG
        const _U = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const _K = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const _G = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';

        const _sb = window.supabase.createClient(_U, _K);
        let _u = null;

        // Login / Logout Logic
        async function doLogin() {
            const { error } = await _sb.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: window.location.origin } 
            });
            if(error) alert("Supabase: Google Provider is not enabled in dashboard.");
        }

        async function doLogout() {
            await _sb.auth.signOut();
            window.location.reload();
        }

        // Auth State Listener
        _sb.auth.onAuthStateChange((ev, ses) => {
            if (ses) {
                _u = ses.user;
                document.getElementById('st').innerText = "Live: " + _u.user_metadata.full_name;
                document.getElementById('u-box').innerHTML = `
                    <div class="flex items-center gap-2">
                        <img src="${_u.user_metadata.avatar_url}" class="w-10 h-10 rounded-full border-2 border-blue-600">
                        <div class="text-left">
                            <span class="text-[10px] font-bold block">${_u.user_metadata.full_name.split(' ')[0]}</span>
                            <span onclick="doLogout()" class="logout-btn">Logout</span>
                        </div>
                    </div>`;
                
                if(_u.email === 'pancardonline51@gmail.com') document.getElementById('adm-btn').classList.remove('hidden');
                loadHist(); // Load History after login
            }
        });

        // Chat Logic
        async function ask() {
            const i = document.getElementById('u-in');
            const t = i.value.trim();
            if(!t) return;
            i.value = '';
            addM(t, 'user');
            document.getElementById('wait').style.display = 'block';

            try {
                // 1. Brain Memory Check
                const { data: br } = await _sb.from('ai_knowledge').select('*').ilike('question', `%${t}%`);
                let ans = "";
                
                if (br && br.length > 0) {
                    ans = br[0].answer;
                } else {
                    // 2. Gemini 1.5 Flash Call (Fixed Payload)
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_G}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: You are MANSIYA-AI, friendly bilingual assistant for Vishal's family. User Question: ${t}` }] }]
                        })
                    });
                    const d = await r.json();
                    if(d.candidates && d.candidates[0].content) {
                        ans = d.candidates[0].content.parts[0].text;
                    } else {
                        ans = "Gemini Model busy. Please try again or check API Key.";
                    }
                }
                addM(ans, 'ai');
                if(_u) saveM(t, ans); // Save only if logged in
            } catch (e) {
                addM("Network Error: Could not connect to AI brain.", 'ai');
            }
            document.getElementById('wait').style.display = 'none';
        }

        function addM(t, s) {
            const w = document.getElementById('chat-win');
            const d = document.createElement('div');
            d.className = s === 'user' ? 'user-msg msg shadow-md' : 'ai-msg msg';
            d.innerHTML = `<p class="text-[8px] font-bold uppercase mb-1 ${s==='user'?'text-blue-100':'text-blue-600'}">${s==='user'?'Aap':'Mansiya'}</p><p>${t}</p>`;
            w.appendChild(d);
            w.scrollTop = w.scrollHeight;
        }

        async function saveM(u, a) {
            if(!_u) return;
            await _sb.from('messages').insert([{ user_email: _u.email, content: u, sender: 'user' }, { user_email: _u.email, content: a, sender: 'ai' }]);
        }

        // Load Chat History from Database
        async function loadHist() {
            if(!_u) return;
            const { data, error } = await _sb.from('messages').select('*').eq('user_email', _u.email).order('created_at', { ascending: true }).limit(30);
            if(data && data.length > 0) {
                document.getElementById('chat-win').innerHTML = ''; // Clear initial msg
                data.forEach(m => addM(m.content, m.sender));
            }
        }

        // Admin Actions
        function shAdm() { document.getElementById('adm-pan').classList.toggle('hidden'); }
        async function saveT() {
            const q = document.getElementById('t-q').value, a = document.getElementById('t-a').value;
            if(!q || !a) return alert("Fill both fields!");
            const { error } = await _sb.from('ai_knowledge').insert([{ question: q, answer: a }]);
            if(!error) { alert("Successfully Learned!"); shAdm(); }
            else { alert("DB Error: " + error.message); }
        }

        document.getElementById('send').onclick = ask;
        document.getElementById('u-in').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
