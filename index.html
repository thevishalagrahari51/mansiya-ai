<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA-AI | Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { background: #f9fafb; color: #1e293b; font-family: 'Outfit', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-win { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 30px 30px 0 0; }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.6; margin-bottom: 12px; animation: fadeIn 0.3s ease; }
        .u-bubble { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .a-bubble { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .bar { background: white; padding: 15px; border-top: 1px solid #f1f5f9; }
        .box { background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 25px; display: flex; align-items: center; padding: 4px; }
        .box:focus-within { border-color: #2563eb; background: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; font-size: 10px; color: #2563eb; font-weight: 800; text-align: center; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-white border-b border-gray-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-robot text-lg"></i></div>
            <div>
                <h1 class="text-lg font-bold tracking-tight">MANSIYA<span class="text-blue-600">AI</span></h1>
                <p id="st" class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">System Online</p>
            </div>
        </div>
        <div id="u-ui">
            <button onclick="doLogin()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-[10px] font-bold shadow-md">Login</button>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="win" class="chat-win flex flex-col">
        <div class="a-bubble bubble">
            <p class="text-[9px] font-bold text-blue-600 mb-1 uppercase">Mansiya Core</p>
            Namaste Vishal ji! Main MANSIYA hoon. Maine aapki <b>PDF read capability</b> aur <b>Web Search</b> ko fix kar diya hai. Poochiye jo poochna hai!
        </div>
    </div>

    <!-- Footer Input -->
    <div class="bar">
        <div id="wait" class="loader uppercase animate-pulse">Mansiya is thinking...</div>
        <div class="max-w-4xl mx-auto flex gap-2">
            <div class="box flex-1">
                <input type="text" id="inp" placeholder="Type a message..." class="flex-1 p-3 outline-none text-sm bg-transparent">
                <button onclick="ask()" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition"><i class="fas fa-arrow-up"></i></button>
            </div>
            <label id="pdf-ui" class="hidden w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center cursor-pointer border hover:bg-gray-200">
                <i class="fas fa-file-pdf text-red-500"></i>
                <input type="file" id="f-pdf" class="hidden" accept=".pdf">
            </label>
        </div>
    </div>

    <!-- Admin Tools -->
    <div id="adm-btn" class="hidden fixed bottom-24 right-6">
        <button onclick="shAdm()" class="bg-white w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center border text-red-500"><i class="fas fa-shield-alt"></i></button>
    </div>

    <div id="adm-pan" class="hidden fixed inset-0 bg-white z-50 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6"><h2 class="text-xl font-bold">Training Hub</h2><button onclick="shAdm()" class="text-3xl">&times;</button></div>
        <div class="space-y-4">
            <input type="text" id="t-q" placeholder="Enter Question Pattern" class="w-full p-4 border rounded-2xl outline-none"><textarea id="t-a" placeholder="Enter Ideal Answer" class="w-full p-4 border rounded-2xl h-40 outline-none"></textarea>
            <button onclick="saveT()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold uppercase">Update AI Memory</button>
        </div>
    </div>

    <script>
        // Use very unique names to avoid browser collision
        const SUPA_URL = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const GEMI_KEY = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';
        const TAV_KEY = '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';

        const _client = window.supabase.createClient(SUPA_URL, SUPA_KEY);
        let _user = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Login Logic
        async function doLogin() {
            const { error } = await _client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
            if(error) alert("Login Error: " + error.message);
        }

        _client.auth.onAuthStateChange((ev, ses) => {
            if (ses) {
                _user = ses.user;
                document.getElementById('u-ui').innerHTML = `<img src="${_user.user_metadata.avatar_url}" class="w-10 h-10 rounded-full border-2 border-blue-600" onclick="_client.auth.signOut().then(()=>location.reload())">`;
                if(_user.email === 'pancardonline51@gmail.com') {
                    document.getElementById('adm-btn').classList.remove('hidden');
                    document.getElementById('pdf-ui').classList.remove('hidden');
                }
                loadHist();
            }
        });

        // PDF Processing
        document.getElementById('f-pdf').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ");
                    }
                    await _client.from('pdf_knowledge').insert([{ file_name: file.name, content: fullText.substring(0, 5000), added_by: _user.email }]);
                    alert("Mansiya ne PDF padh liya hai!");
                } catch(err) { alert("PDF Error: " + err.message); }
            };
            reader.readAsArrayBuffer(file);
        };

        // Main Chat
        async function ask() {
            const inp = document.getElementById('inp');
            const txt = inp.value.trim();
            if(!txt) return;

            inp.value = '';
            addMsg(txt, 'user');
            document.getElementById('wait').style.display = 'block';

            try {
                // 1. Brain Search
                const { data: brData } = await _client.from('ai_knowledge').select('*').ilike('question', `%${txt}%`);
                
                // 2. PDF Search
                const { data: pdfData } = await _client.from('pdf_knowledge').select('content').ilike('content', `%${txt}%`).limit(1);

                let finalAns = "";

                if (brData && brData.length > 0) {
                    finalAns = brData[0].answer;
                } else {
                    // 3. Web Search
                    let searchContext = "";
                    if(txt.length > 5) {
                        try {
                            const sRes = await fetch('https://api.tavily.com/search', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ api_key: TAV_KEY, query: txt })
                            });
                            const sData = await sRes.json();
                            searchContext = JSON.stringify(sData.results);
                        } catch(se) { console.log("Tavily Error"); }
                    }

                    // 4. Gemini Call
                    const pdfContext = pdfData && pdfData.length > 0 ? `PDF Context: ${pdfData[0].content.substring(0, 1000)}` : "";
                    const gRes = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMI_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: You are MANSIYA-AI, friendly bilingual assistant. Created by Vishal. ${pdfContext}. Search: ${searchContext}. User Question: ${txt}.` }] }]
                        })
                    });
                    const gData = await gRes.json();
                    
                    if(gData.candidates && gData.candidates[0].content) {
                        finalAns = gData.candidates[0].content.parts[0].text;
                    } else {
                        finalAns = "Error: " + JSON.stringify(gData.error || "No response from AI");
                    }
                }
                addMsg(finalAns, 'ai');
                if(_user) saveMsg(txt, finalAns);
            } catch (err) {
                addMsg("Mukhya dimaag se sampark nahi ho paa raha. Error: " + err.message, 'ai');
            }
            document.getElementById('wait').style.display = 'none';
        }

        function addMsg(t, s) {
            const w = document.getElementById('win');
            const d = document.createElement('div');
            d.className = s === 'user' ? 'bubble u-bubble' : 'bubble a-bubble';
            d.innerHTML = s === 'ai' ? `<p class="text-[8px] font-bold text-blue-600 mb-1">MANSIYA</p>${t}` : t;
            w.appendChild(d);
            w.scrollTop = w.scrollHeight;
        }

        async function saveMsg(u, a) {
            await _client.from('messages').insert([{ user_email: _user.email, content: u, sender: 'user' }, { user_email: _user.email, content: a, sender: 'ai' }]);
        }

        async function loadHist() {
            const { data } = await _client.from('messages').select('*').eq('user_email', _user.email).order('created_at', { ascending: true }).limit(20);
            if(data && data.length > 0) {
                document.getElementById('win').innerHTML = '';
                data.forEach(m => addMsg(m.content, m.sender));
            }
        }

        function shAdm() { document.getElementById('adm-pan').classList.toggle('hidden'); }
        async function saveT() {
            const q = document.getElementById('t-q').value, a = document.getElementById('t-a').value;
            const { error } = await _client.from('ai_knowledge').insert([{ question: q, answer: a }]);
            if(!error) { alert("Brain Updated!"); shAdm(); }
        }

        document.getElementById('inp').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
