<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA-AI | Intelligence Evolution</title>
    <!-- Tailwind v4 Browser Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root { --p-blue: #007aff; --s-bg: #fcfcfd; }
        body { background: var(--s-bg); color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 24px 16px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 24px; font-size: 15px; line-height: 1.6; margin-bottom: 16px; animation: slideUp 0.3s ease-out; }
        .u-bubble { background: var(--p-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15); }
        .a-bubble { background: white; border: 1px solid #f1f3f5; align-self: flex-start; border-bottom-left-radius: 4px; color: #1a1c1e; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        .input-box { background: #f1f3f5; border-radius: 30px; display: flex; align-items: center; padding: 6px 6px 6px 20px; border: 2px solid transparent; transition: 0.3s; }
        .input-box:focus-within { background: white; border-color: var(--p-blue); box-shadow: 0 0 15px rgba(0,122,255,0.08); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; text-align: center; font-size: 10px; font-weight: 800; color: var(--p-blue); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; }
        
        #admin-panel { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <!-- Premium Nav -->
    <nav class="bg-white/80 backdrop-blur-xl p-4 sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-100">
                    <i class="fas fa-brain"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight">MANSIYA<span class="text-blue-600 italic text-sm font-black">AI</span></h1>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span id="st-text" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Neural Live</span>
                    </div>
                </div>
            </div>
            <div id="u-panel">
                <button onclick="doLogin()" class="bg-gray-900 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-wider hover:bg-black transition">Login</button>
            </div>
        </div>
    </nav>

    <!-- Chat Area -->
    <div id="chat-win" class="chat-container flex flex-col">
        <div class="a-bubble bubble">
            <p class="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-widest">System Protocols</p>
            Namaste Vishal ji! Maine **Gemini 1.5-Flash** aur **Tailwind v4** fix kar diye hain. Ab 404 error nahi aayega. Poochiye jo poochna hai!
        </div>
    </div>

    <!-- Input Section -->
    <div class="p-4 bg-white border-t border-gray-100">
        <div id="loading" class="loader">Mansiya is thinking...</div>
        <div class="max-w-4xl mx-auto flex gap-3">
            <div class="input-box flex-1">
                <input type="text" id="userInput" placeholder="Ask MANSIYA anything..." class="flex-1 p-3 outline-none text-sm bg-transparent" autocomplete="off">
                <button onclick="ask()" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition shadow-lg"><i class="fas fa-arrow-up"></i></button>
            </div>
            <!-- PDF Upload (Only for Admin) -->
            <label id="pdf-trigger" class="hidden w-12 h-12 bg-white border border-gray-200 rounded-full flex items-center justify-center cursor-pointer shadow-sm hover:bg-gray-50 transition">
                <i class="fas fa-file-pdf text-red-500"></i>
                <input type="file" id="pdf-input" class="hidden" accept=".pdf">
            </label>
        </div>
        <p class="text-center text-[9px] text-gray-400 mt-4 font-bold uppercase tracking-widest italic">Designed by Vishal | For Varsha, Mansi & Siya</p>
    </div>

    <!-- Admin Tools -->
    <div id="adm-shield" class="hidden fixed bottom-32 right-8">
        <button onclick="toggleAdmin()" class="w-14 h-14 bg-white border border-gray-100 rounded-2xl shadow-2xl flex items-center justify-center text-red-500 active:scale-95 transition">
            <i class="fas fa-shield-halved text-xl"></i>
        </button>
    </div>

    <div id="admin-panel" class="hidden fixed inset-x-0 bottom-0 top-20 bg-white/95 backdrop-blur-xl z-[100] p-8 rounded-t-[40px] shadow-2xl border-t border-gray-100 translate-y-full">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold">Neural Training Database</h2>
                <button onclick="toggleAdmin()" class="text-4xl text-gray-400">&times;</button>
            </div>
            <div class="space-y-6">
                <input type="text" id="t-question" placeholder="Common Question Pattern..." class="w-full p-5 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 ring-blue-500 transition">
                <textarea id="t-answer" placeholder="Ideal AI Response..." class="w-full p-5 bg-gray-50 border-none rounded-2xl h-44 outline-none focus:ring-2 ring-blue-500 transition"></textarea>
                <button onclick="saveMemory()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-bold uppercase shadow-2xl shadow-blue-100 hover:bg-blue-700 transition">Commit to Memory</button>
            </div>
        </div>
    </div>

    <script>
        // Use unique constants to prevent variable declaration conflicts
        const CONFIG_S_URL = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const CONFIG_S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const CONFIG_G_KEY = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';
        const CONFIG_T_KEY = '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';

        const _finalClient = window.supabase.createClient(CONFIG_S_URL, CONFIG_S_KEY);
        let _activeUserSession = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Safety Filter Logic
        const forbiddenWordsList = ["gali", "badword", "abuse"]; // Vishal ji, yahan aur shabd jodein
        function isContentSafe(text) {
            return !forbiddenWordsList.some(w => text.toLowerCase().includes(w));
        }

        // Auth Operations
        async function doLogin() {
            await _finalClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
        }

        _finalClient.auth.onAuthStateChange((ev, ses) => {
            if (ses) {
                _activeUserSession = ses.user;
                document.getElementById('u-panel').innerHTML = `<img src="${_activeUserSession.user_metadata.avatar_url}" class="w-10 h-10 rounded-full border-2 border-blue-600 shadow-sm cursor-pointer" onclick="_finalClient.auth.signOut().then(()=>location.reload())" title="Click to Logout">`;
                if(_activeUserSession.email === 'pancardonline51@gmail.com') {
                    document.getElementById('adm-shield').classList.remove('hidden');
                    document.getElementById('pdf-trigger').classList.remove('hidden');
                }
                loadChatHistory();
            }
        });

        // PDF Learning Logic
        document.getElementById('pdf-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ");
                    }
                    await _finalClient.from('pdf_knowledge').insert([{ file_name: file.name, content: fullText.substring(0, 10000), added_by: _activeUserSession.email }]);
                    alert("MANSIYA ne PDF seekh liya hai!");
                } catch(err) { alert("PDF Error: " + err.message); }
            };
            reader.readAsArrayBuffer(file);
        };

        // Main Brain Pulse
        async function ask() {
            const inp = document.getElementById('userInput');
            const txt = inp.value.trim();
            if(!txt) return;

            if(!isContentSafe(txt)) {
                addMessage("Ashabhya bhasha varjit hai. Kripya dhyan dein.", 'ai');
                inp.value = ''; return;
            }

            inp.value = '';
            addMessage(txt, 'user');
            document.getElementById('loading').style.display = 'block';

            try {
                // Check Brain Knowledge Table
                const { data: memData } = await _finalClient.from('ai_knowledge').select('*').ilike('question', `%${txt}%`);
                // Check PDF Knowledge Table
                const { data: pdfMem } = await _finalClient.from('pdf_knowledge').select('content').ilike('content', `%${txt}%`).limit(1);

                let finalResponse = "";
                if (memData && memData.length > 0) {
                    finalResponse = memData[0].answer;
                } else {
                    // Web Search Engine
                    let webCtx = "";
                    try {
                        const sReq = await fetch('https://api.tavily.com/search', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ api_key: CONFIG_T_KEY, query: txt })
                        });
                        const sData = await sReq.json();
                        webCtx = JSON.stringify(sData.results);
                    } catch(e) {}

                    // Gemini Stable Endpoint Call (Fixed 404 Issue)
                    const pdfInfo = pdfMem && pdfMem.length > 0 ? `PDF Reference: ${pdfMem[0].content.substring(0, 1000)}` : "";
                    const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CONFIG_G_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Persona: MANSIYA-AI, friendly bilingual assistant for Vishal's family. Knowledge: ${pdfInfo}. Web Context: ${webCtx}. User: ${txt}. Style: Conversational and helpful.` }] }]
                        })
                    });
                    const geminiData = await geminiRes.json();
                    if(geminiData.candidates && geminiData.candidates[0].content) {
                        finalResponse = geminiData.candidates[0].content.parts[0].text;
                    } else {
                        finalResponse = "System busy! Kripya thodi der baad punah prayas karein. Error: " + JSON.stringify(geminiData.error);
                    }
                }
                
                if(!isContentSafe(finalResponse)) finalResponse = "Maaf kijiye, main is vishay par baat nahi kar sakti.";
                addMessage(finalResponse, 'ai');
                if(_activeUserSession) saveToDatabase(txt, finalResponse);

            } catch (err) {
                addMessage("Brain Connection Timeout! Status: " + err.message, 'ai');
            }
            document.getElementById('loading').style.display = 'none';
        }

        function addMessage(t, s) {
            const win = document.getElementById('chat-win');
            const d = document.createElement('div');
            d.className = s === 'user' ? 'bubble u-bubble' : 'bubble a-bubble';
            d.innerHTML = s === 'ai' ? `<p class="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-widest">Mansiya Core</p>${t}` : t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        async function saveToDatabase(u, a) {
            await _finalClient.from('messages').insert([{ user_email: _activeUserSession.email, content: u, sender: 'user' }, { user_email: _activeUserSession.email, content: a, sender: 'ai' }]);
        }

        async function loadChatHistory() {
            const { data } = await _finalClient.from('messages').select('*').eq('user_email', _activeUserSession.email).order('created_at', { ascending: true }).limit(30);
            if(data && data.length > 0) {
                document.getElementById('chat-win').innerHTML = '';
                data.forEach(m => addMessage(m.content, m.sender));
            }
        }

        function toggleAdmin() { 
            const panel = document.getElementById('admin-panel');
            if(panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                setTimeout(() => panel.style.transform = "translateY(0)", 10);
            } else {
                panel.style.transform = "translateY(100%)";
                setTimeout(() => panel.classList.add('hidden'), 500);
            }
        }
        
        async function saveMemory() {
            const q = document.getElementById('t-question').value, a = document.getElementById('t-answer').value;
            if(!q || !a) return alert("Fill all fields!");
            const { error } = await _finalClient.from('ai_knowledge').insert([{ question: q, answer: a }]);
            if(!error) { alert("Brain Memory Updated!"); toggleAdmin(); }
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
