<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA-AI | Premium AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { background: #f8fafc; color: #334155; font-family: 'Outfit', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 30px 30px 0 0; }
        .user-msg { background: #3b82f6; color: white; align-self: flex-end; border-radius: 20px 20px 2px 200px; padding: 12px 20px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); max-width: 85%; }
        .ai-msg { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-radius: 20px 20px 20px 2px; padding: 12px 20px; border: 1px solid #e2e8f0; max-width: 85%; }
        .input-area { background: white; border-top: 1px solid #f1f5f9; padding: 15px; }
        .input-box { border: 2px solid #e2e8f0; border-radius: 20px; transition: 0.3s; }
        .input-box:focus-within { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.1); }
        .loading { display: none; font-size: 12px; color: #3b82f6; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header class="p-4 glass-header flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold">MANSIYA<span class="text-blue-600">AI</span></h1>
                <p id="online-status" class="text-[9px] text-gray-400 font-bold uppercase tracking-widest italic">Server: Checking...</p>
            </div>
        </div>
        <div id="auth-ui">
            <button onclick="login()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-700 transition">Login with Google</button>
        </div>
    </header>

    <div id="chat-box" class="chat-container flex flex-col gap-4">
        <div class="ai-msg">
            <p class="text-[10px] font-bold text-blue-600 mb-1">SYSTEM</p>
            <p class="text-sm">Namaste! Kripya Login karein. Agar chat nahi chal rahi, toh browser console (F12) check karein - ho sakta hai CORS block ho raha ho.</p>
        </div>
    </div>

    <div class="input-area">
        <div id="loader" class="loading tracking-widest uppercase">Mansiya is thinking...</div>
        <div class="max-w-4xl mx-auto flex gap-2 input-box p-1">
            <input type="text" id="userInput" placeholder="Ask anything..." class="flex-1 p-3 outline-none text-sm bg-transparent">
            <button id="sendBtn" class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center hover:bg-blue-700 active:scale-90 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Admin Panel Button -->
    <div id="admin-shield" class="hidden fixed bottom-24 right-6">
        <button onclick="toggleAdmin()" class="bg-red-500 w-12 h-12 rounded-full text-white shadow-2xl border-2 border-white"><i class="fas fa-shield-alt"></i></button>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-white z-50 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Training Mode</h2>
            <button onclick="toggleAdmin()" class="text-3xl text-gray-400">&times;</button>
        </div>
        <div class="bg-gray-50 p-6 rounded-3xl border">
            <input type="text" id="t-q" placeholder="Sawal" class="w-full p-4 mb-3 rounded-2xl border outline-none focus:border-blue-500">
            <textarea id="t-a" placeholder="Jawab" class="w-full p-4 mb-3 rounded-2xl border h-32 outline-none focus:border-blue-500"></textarea>
            <button onclick="doTrain()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">AI ko Sikhayein</button>
        </div>
    </div>

    <script>
        const S_URL = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const G_KEY = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';
        const T_KEY = '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';

        const supabase = window.supabase.createClient(S_URL, S_KEY);
        let user = null;

        async function login() {
            const { error } = await supabase.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: window.location.origin } // Dynamic Redirect
            });
            if(error) alert("Login Error: " + error.message);
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                user = session.user;
                document.getElementById('online-status').innerText = "Live: " + user.user_metadata.full_name;
                document.getElementById('auth-ui').innerHTML = `<img src="${user.user_metadata.avatar_url}" class="w-10 h-10 rounded-full border-2 border-blue-600 shadow-sm">`;
                if(user.email === 'pancardonline51@gmail.com') document.getElementById('admin-shield').classList.remove('hidden');
                loadHistory();
            }
        });

        async function chat() {
            const inp = document.getElementById('userInput');
            const txt = inp.value.trim();
            if(!txt) return;

            inp.value = '';
            addMsg(txt, 'user');
            document.getElementById('loader').style.display = 'block';

            try {
                // 1. Database Check
                const { data: dbData } = await supabase.from('ai_knowledge').select('*').ilike('question', `%${txt}%`);
                
                let res = "";
                if (dbData && dbData.length > 0) {
                    res = dbData[0].answer;
                } else {
                    // 2. Gemini API (Using direct fetch)
                    // Note: Browser block ho sakta hai CORS ki wajah se
                    const gRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${G_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `You are MANSIYA-AI, friendly, bilingual. Created by Vishal. User: ${txt}` }] }] })
                    });
                    const gData = await gRes.json();
                    res = gData.candidates[0].content.parts[0].text;
                }
                addMsg(res, 'ai');
                saveChat(txt, res);
            } catch (e) {
                addMsg("Error: AI Response blocked by Browser (CORS). Please check Console.", 'ai');
                console.error("CORS Error Help: Gemini API direct browser calls are often blocked in production. Use a backend or a proxy.", e);
            }
            document.getElementById('loader').style.display = 'none';
        }

        function addMsg(t, s) {
            const b = document.getElementById('chat-box');
            const d = document.createElement('div');
            d.className = s === 'user' ? 'user-msg' : 'ai-msg';
            d.innerHTML = `<p class="text-[9px] font-bold uppercase ${s === 'user' ? 'text-blue-200' : 'text-blue-600'}">${s === 'user' ? 'Aap' : 'Mansiya AI'}</p><p class="text-sm">${t}</p>`;
            b.appendChild(d);
            b.scrollTop = b.scrollHeight;
        }

        async function saveChat(u, a) {
            if(!user) return;
            await supabase.from('messages').insert([{ user_email: user.email, content: u, sender: 'user' }, { user_email: user.email, content: a, sender: 'ai' }]);
        }

        async function loadHistory() {
            const { data } = await supabase.from('messages').select('*').eq('user_email', user.email).order('created_at', { ascending: true }).limit(20);
            if(data) data.forEach(m => addMsg(m.content, m.sender));
        }

        function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('hidden'); }
        async function doTrain() {
            const q = document.getElementById('t-q').value;
            const a = document.getElementById('t-a').value;
            await supabase.from('ai_knowledge').insert([{ question: q, answer: a }]);
            alert("Success!");
            toggleAdmin();
        }

        document.getElementById('sendBtn').onclick = chat;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') chat(); };
    </script>
</body>
</html>
