<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA - Final AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { background: #f8fafc; color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 30px 30px 0 0; }
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 15px; line-height: 1.6; margin-bottom: 15px; animation: slideUp 0.3s ease; }
        .u-bubble { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .a-bubble { background: #f1f3f5; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .input-bar { background: white; padding: 16px; border-top: 1px solid #f1f3f5; }
        .box-wrap { background: #f1f3f5; border-radius: 30px; display: flex; align-items: center; padding: 6px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; text-align: center; font-size: 10px; font-weight: 800; color: #007aff; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-white border-b border-gray-50 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-100"><i class="fas fa-robot"></i></div>
            <div>
                <h1 class="text-base font-bold tracking-tight">MANSIYA<span class="text-blue-600 italic text-sm">PRO</span></h1>
                <p id="st-text" class="text-[9px] text-green-500 font-bold uppercase tracking-widest animate-pulse">Neural Active</p>
            </div>
        </div>
        <div id="u-panel">
            <button onclick="doLogin()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-[10px] font-black shadow-lg">Login</button>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-win" class="chat-container flex flex-col">
        <div class="a-bubble bubble shadow-sm">
            <p class="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-widest">System Broadcast</p>
            Namaste Vishal ji! Maine **Gemini-Pro** model set kar diya hai. Ab 404 error nahi aayega. PDF aur Web Search puri tarah ready hain. Poochiye!
        </div>
    </div>

    <!-- Input Section -->
    <div class="input-bar">
        <div id="loading" class="loader">Mansiya is thinking...</div>
        <div class="max-w-4xl mx-auto flex gap-3">
            <div class="box-wrap flex-1">
                <input type="text" id="userInput" placeholder="Type or Teach..." class="flex-1 p-3 outline-none text-sm bg-transparent" autocomplete="off">
                <button onclick="ask()" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition shadow-md"><i class="fas fa-arrow-up"></i></button>
            </div>
            <!-- PDF Upload Button (Visible after Admin Login) -->
            <label id="pdf-trigger" class="hidden w-12 h-12 bg-white border border-gray-100 rounded-full flex items-center justify-center cursor-pointer shadow-sm hover:bg-gray-50 transition">
                <i class="fas fa-file-pdf text-red-500"></i>
                <input type="file" id="pdf-input" class="hidden" accept=".pdf">
            </label>
        </div>
        <p class="text-center text-[9px] text-gray-400 mt-4 font-bold uppercase tracking-[0.2em] italic">Built for Varsha, Mansi & Siya | By Vishal</p>
    </div>

    <!-- Admin Floating Control -->
    <div id="adm-shield" class="hidden fixed bottom-28 right-8">
        <button onclick="toggleAdmin()" class="w-14 h-14 bg-white border border-gray-100 rounded-2xl shadow-2xl flex items-center justify-center text-red-500 active:scale-95 transition">
            <i class="fas fa-shield-halved text-xl"></i>
        </button>
    </div>

    <div id="adm-modal" class="hidden fixed inset-0 bg-white/95 backdrop-blur-md z-[100] p-8 overflow-y-auto">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-bold">Training Database</h2>
                <button onclick="toggleAdmin()" class="text-4xl text-gray-400">&times;</button>
            </div>
            <div class="space-y-5">
                <input type="text" id="t-question" placeholder="Common Question..." class="w-full p-5 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 ring-blue-500">
                <textarea id="t-answer" placeholder="Your Custom Answer..." class="w-full p-5 bg-gray-50 border-none rounded-2xl h-44 outline-none focus:ring-2 ring-blue-500"></textarea>
                <button onclick="saveMemory()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-bold uppercase shadow-2xl shadow-blue-100">Commit to Brain</button>
            </div>
        </div>
    </div>

    <script>
        // Use very unique names to prevent conflict
        const FINAL_S_URL = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const FINAL_S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const FINAL_G_KEY = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';
        const FINAL_T_KEY = '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';

        const _sbClient = window.supabase.createClient(FINAL_S_URL, FINAL_S_KEY);
        let _activeUser = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // 1. Safety Protocol
        const blockedWords = ["gali", "toxic", "badword", "haram"]; // Add more here
        function checkSafety(t) {
            return !blockedWords.some(w => t.toLowerCase().includes(w));
        }

        // 2. Auth Actions
        async function doLogin() {
            await _sbClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
        }

        _sbClient.auth.onAuthStateChange((ev, ses) => {
            if (ses) {
                _activeUser = ses.user;
                document.getElementById('u-panel').innerHTML = `<img src="${_activeUser.user_metadata.avatar_url}" class="w-10 h-10 rounded-full border-2 border-blue-600 shadow-sm" onclick="_sbClient.auth.signOut().then(()=>location.reload())">`;
                if(_activeUser.email === 'pancardonline51@gmail.com') {
                    document.getElementById('adm-shield').classList.remove('hidden');
                    document.getElementById('pdf-trigger').classList.remove('hidden');
                }
                loadChatHistory();
            }
        });

        // 3. PDF Learning
        document.getElementById('pdf-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ");
                    }
                    await _sbClient.from('pdf_knowledge').insert([{ file_name: file.name, content: fullText.substring(0, 8000), added_by: _activeUser.email }]);
                    alert("Mansiya ne PDF padh liya hai!");
                } catch(err) { alert("PDF Error: " + err.message); }
            };
            reader.readAsArrayBuffer(file);
        };

        // 4. Main AI Pulse
        async function ask() {
            const inp = document.getElementById('userInput');
            const txt = inp.value.trim();
            if(!txt) return;

            if(!checkSafety(txt)) {
                addMessage("Main ashabhya bhasha nahi seekh sakti. Kripya dhyan dein.", 'ai');
                inp.value = ''; return;
            }

            inp.value = '';
            addMessage(txt, 'user');
            document.getElementById('loading').style.display = 'block';

            try {
                // Search Local Memory First
                const { data: brMem } = await _sbClient.from('ai_knowledge').select('*').ilike('question', `%${txt}%`);
                const { data: pdfMem } = await _sbClient.from('pdf_knowledge').select('content').ilike('content', `%${txt}%`).limit(1);

                let finalAns = "";
                if (brMem && brMem.length > 0) {
                    finalAns = brMem[0].answer;
                } else {
                    // Web Search Logic
                    let webCtx = "";
                    try {
                        const sR = await fetch('https://api.tavily.com/search', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ api_key: FINAL_T_KEY, query: txt })
                        });
                        const sD = await sR.json();
                        webCtx = JSON.stringify(sD.results);
                    } catch(e) {}

                    // Gemini-Pro Call (Most Stable Version)
                    const pdfCtx = pdfMem && pdfMem.length > 0 ? `PDF Info: ${pdfMem[0].content.substring(0, 1000)}` : "";
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${FINAL_G_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: You are MANSIYA-AI, friendly bilingual assistant. Created by Vishal for family. ${pdfCtx}. Web: ${webCtx}. Question: ${txt}. Respond warmly.` }] }]
                        })
                    });
                    const d = await r.json();
                    if(d.candidates) finalAns = d.candidates[0].content.parts[0].text;
                    else finalAns = "API quota reached or Error: " + JSON.stringify(d.error);
                }
                addMessage(finalAns, 'ai');
                if(_activeUser) saveChatDB(txt, finalAns);
            } catch (err) {
                addMessage("Mukhya dimaag busy hai. Error: " + err.message, 'ai');
            }
            document.getElementById('loading').style.display = 'none';
        }

        function addMessage(t, s) {
            const win = document.getElementById('chat-win');
            const d = document.createElement('div');
            d.className = s === 'user' ? 'bubble u-bubble' : 'bubble a-bubble';
            d.innerHTML = s === 'ai' ? `<p class="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-widest">Mansiya AI</p>${t}` : t;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        async function saveChatDB(u, a) {
            await _sbClient.from('messages').insert([{ user_email: _activeUser.email, content: u, sender: 'user' }, { user_email: _activeUser.email, content: a, sender: 'ai' }]);
        }

        async function loadChatHistory() {
            const { data } = await _sbClient.from('messages').select('*').eq('user_email', _activeUser.email).order('created_at', { ascending: true }).limit(30);
            if(data && data.length > 0) {
                document.getElementById('chat-win').innerHTML = '';
                data.forEach(m => addMessage(m.content, m.sender));
            }
        }

        function toggleAdmin() { document.getElementById('adm-modal').classList.toggle('hidden'); }
        
        async function saveMemory() {
            const q = document.getElementById('t-question').value, a = document.getElementById('t-answer').value;
            if(!q || !a) return alert("Fill all fields!");
            await _sbClient.from('ai_knowledge').insert([{ question: q, answer: a }]);
            alert("Learned!"); toggleAdmin();
        }

        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
