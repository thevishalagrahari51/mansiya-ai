<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA-AI | Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { background: #fcfcfd; color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 30px 30px 0 0; }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.6; margin-bottom: 12px; animation: fadeIn 0.3s ease; }
        .u-bubble { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2); }
        .a-bubble { background: #f1f3f5; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .input-bar { background: white; padding: 15px; border-top: 1px solid #f1f3f5; }
        .box { background: #f1f3f5; border-radius: 30px; display: flex; align-items: center; padding: 6px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; text-align: center; font-size: 10px; font-weight: bold; color: #007aff; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-white sticky top-0 z-10 border-b border-gray-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-brain"></i></div>
            <div>
                <h1 class="text-base font-bold">MANSIYA<span class="text-blue-600">AI</span></h1>
                <p id="st" class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Active System</p>
            </div>
        </div>
        <div id="u-ui">
            <button onclick="doLogin()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[10px] font-bold shadow-md">Admin Login</button>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="win" class="chat-area flex flex-col">
        <div class="a-bubble bubble">
            <p class="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-wider">Mansiya Protocol</p>
            Namaste Vishal ji! Main MANSIYA hoon. Maine <b>Gemini v1beta</b> fix kar diya hai. Ab main 100% reply dungi. Poochiye!
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div id="wait" class="loader animate-pulse">Processing Neural Pulse...</div>
        <div class="max-w-4xl mx-auto flex gap-2">
            <div class="box flex-1">
                <input type="text" id="inp" placeholder="Type a message..." class="flex-1 p-3 outline-none text-sm bg-transparent" autocomplete="off">
                <button onclick="ask()" id="sendBtn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition"><i class="fas fa-arrow-up"></i></button>
            </div>
            <!-- PDF Upload (Only for Admin) -->
            <label id="pdf-ui" class="hidden w-12 h-12 bg-white border border-gray-100 rounded-full flex items-center justify-center cursor-pointer hover:bg-gray-50 transition">
                <i class="fas fa-file-pdf text-red-500"></i>
                <input type="file" id="f-pdf" class="hidden" accept=".pdf">
            </label>
        </div>
        <p class="text-center text-[9px] text-gray-400 mt-4 tracking-widest uppercase font-bold italic">Bilingual AI | Powered by Vishal</p>
    </div>

    <!-- Admin Section -->
    <div id="adm-btn" class="hidden fixed bottom-24 right-6">
        <button onclick="shAdm()" class="bg-white w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center border text-red-500 active:scale-90 transition">
            <i class="fas fa-shield-halved text-lg"></i>
        </button>
    </div>

    <div id="adm-pan" class="hidden fixed inset-0 bg-white/95 backdrop-blur-md z-50 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">Neural Training Hub</h2>
            <button onclick="shAdm()" class="text-3xl text-gray-400">&times;</button>
        </div>
        <div class="space-y-4 max-w-xl mx-auto">
            <input type="text" id="t-q" placeholder="Enter Question Pattern" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 ring-blue-500 bg-gray-50">
            <textarea id="t-a" placeholder="Enter Ideal AI Response" class="w-full p-4 border rounded-2xl h-40 outline-none focus:ring-2 ring-blue-500 bg-gray-50"></textarea>
            <button onclick="saveT()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold uppercase shadow-xl hover:bg-blue-700 transition">Update AI Memory</button>
        </div>
    </div>

    <script>
        const S_URL = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const G_KEY = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';
        const T_KEY = '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';

        const _client = window.supabase.createClient(S_URL, S_KEY);
        let _user = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function doLogin() {
            const { error } = await _client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
            if(error) alert("Admin: Login failed. Check Supabase Redirect URL.");
        }

        _client.auth.onAuthStateChange((ev, ses) => {
            if (ses) {
                _user = ses.user;
                document.getElementById('u-ui').innerHTML = `<img src="${_user.user_metadata.avatar_url}" class="w-10 h-10 rounded-full border-2 border-blue-600 shadow-sm" onclick="_client.auth.signOut().then(()=>location.reload())">`;
                if(_user.email === 'pancardonline51@gmail.com') {
                    document.getElementById('adm-btn').classList.remove('hidden');
                    document.getElementById('pdf-ui').classList.remove('hidden');
                }
                loadHist();
            }
        });

        // PDF Reader
        document.getElementById('f-pdf').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ");
                    }
                    await _client.from('pdf_knowledge').insert([{ file_name: file.name, content: fullText.substring(0, 10000), added_by: _user.email }]);
                    alert("Mansiya ne PDF padh liya hai!");
                } catch(err) { alert("PDF Error: " + err.message); }
            };
            reader.readAsArrayBuffer(file);
        };

        async function ask() {
            const inp = document.getElementById('inp');
            const txt = inp.value.trim();
            if(!txt) return;

            inp.value = '';
            addMsg(txt, 'user');
            document.getElementById('wait').style.display = 'block';

            try {
                // 1. Brain Memory Search
                const { data: brData } = await _client.from('ai_knowledge').select('*').ilike('question', `%${txt}%`);
                
                // 2. PDF Search
                const { data: pdfData } = await _client.from('pdf_knowledge').select('content').ilike('content', `%${txt}%`).limit(1);

                let finalAns = "";
                if (brData && brData.length > 0) {
                    finalAns = brData[0].answer;
                } else {
                    // 3. Web Search (Tavily)
                    let searchContext = "";
                    try {
                        const sRes = await fetch('https://api.tavily.com/search', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ api_key: T_KEY, query: txt })
                        });
                        const sData = await sRes.json();
                        searchContext = JSON.stringify(sData.results);
                    } catch(e) {}

                    // 4. Gemini v1beta call (Stable)
                    const pdfContext = pdfData && pdfData.length > 0 ? `PDF Context: ${pdfData[0].content.substring(0, 1000)}` : "";
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Instructions: You are MANSIYA-AI, a friendly bilingual AI for Vishal's family. ${pdfContext}. Search results: ${searchContext}. Question: ${txt}. Respond in user's language style.` }] }]
                        })
                    });
                    const d = await r.json();
                    if(d.candidates) finalAns = d.candidates[0].content.parts[0].text;
                    else finalAns = "API Error: " + JSON.stringify(d.error);
                }
                addMsg(finalAns, 'ai');
                if(_user) saveChat(txt, finalAns);
            } catch (err) {
                addMsg("System Error: " + err.message, 'ai');
            }
            document.getElementById('wait').style.display = 'none';
        }

        function addMsg(t, s) {
            const w = document.getElementById('win');
            const d = document.createElement('div');
            d.className = s === 'user' ? 'bubble u-bubble shadow-sm' : 'bubble a-bubble';
            d.innerHTML = s === 'ai' ? `<p class="text-[9px] font-bold text-blue-600 mb-1 uppercase tracking-wider">Mansiya AI</p>${t}` : t;
            w.appendChild(d);
            w.scrollTop = w.scrollHeight;
        }

        async function saveChat(u, a) {
            await _client.from('messages').insert([{ user_email: _user.email, content: u, sender: 'user' }, { user_email: _user.email, content: a, sender: 'ai' }]);
        }

        async function loadHist() {
            const { data } = await _client.from('messages').select('*').eq('user_email', _user.email).order('created_at', { ascending: true }).limit(30);
            if(data && data.length > 0) {
                document.getElementById('win').innerHTML = '';
                data.forEach(m => addMsg(m.content, m.sender));
            }
        }

        function shAdm() { document.getElementById('adm-pan').classList.toggle('hidden'); }
        async function saveT() {
            const q = document.getElementById('t-q').value, a = document.getElementById('t-a').value;
            await _client.from('ai_knowledge').insert([{ question: q, answer: a }]);
            alert("Success!"); shAdm();
        }

        document.getElementById('inp').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
    </script>
</body>
</html>
