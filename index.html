<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MANSIYA-AI | Intelligence Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        body { background: #f0f4f8; color: #1e293b; font-family: 'Outfit', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Premium Light Theme UI */
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .chat-container { background: white; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.03); }
        .user-msg { background: #0084ff; color: white; border-radius: 20px 20px 4px 20px; padding: 12px 18px; box-shadow: 0 4px 15px rgba(0, 132, 255, 0.2); }
        .ai-msg { background: #f1f5f9; color: #334155; border-radius: 20px 20px 20px 4px; padding: 12px 18px; border: 1px solid #e2e8f0; }
        
        .input-bar { background: white; border: 1px solid #e2e8f0; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .send-btn { background: #0084ff; transition: 0.3s; }
        .send-btn:hover { background: #0073e6; transform: scale(1.05); }

        .loading-dots span { animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 glass-header flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="fas fa-robot text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-800">MANSIYA<span class="text-blue-600">AI</span></h1>
                <div class="flex items-center gap-1.5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="status" class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Live Server</span>
                </div>
            </div>
        </div>
        <div id="auth-box">
            <button onclick="login()" class="bg-gray-900 text-white px-5 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-black transition-all">
                <i class="fab fa-google"></i> Login
            </button>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-box" class="flex-1 overflow-y-auto px-4 py-6 space-y-4 flex flex-col chat-container">
        <div class="ai-msg self-start max-w-[85%]">
            <p class="text-[10px] text-blue-600 font-bold uppercase mb-1">Mansiya Protocol</p>
            <p class="text-sm">Namaste! Main MANSIYA hoon. Vishal ji, Varsha ji aur puri family ke liye banayi gayi ek smart AI. Kripya login karein.</p>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="p-4 bg-white border-t border-gray-100">
        <div class="max-w-4xl mx-auto flex gap-2 input-bar p-1.5 pl-4">
            <input type="text" id="userInput" placeholder="Ask MANSIYA something..." 
                   class="flex-1 bg-transparent p-3 outline-none text-sm text-gray-700">
            <button id="sendBtn" class="send-btn text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-3 font-medium">Safe & Secure | Powered by Vishal</p>
    </div>

    <!-- Admin Button -->
    <div id="admin-btn" class="hidden fixed bottom-24 right-6">
        <button onclick="toggleAdmin()" class="bg-red-500 w-12 h-12 rounded-full shadow-xl flex items-center justify-center border-2 border-white">
            <i class="fas fa-shield-alt text-white text-lg"></i>
        </button>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-white z-50 p-6 overflow-y-auto">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-gray-800">Admin Control Panel</h2>
                <button onclick="toggleAdmin()" class="text-gray-400 text-4xl">&times;</button>
            </div>
            
            <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                <h3 class="text-blue-600 font-bold mb-4 uppercase text-xs">AI Knowledge Base</h3>
                <input type="text" id="train-q" placeholder="Enter Question" class="w-full bg-white border border-gray-200 p-4 rounded-2xl mb-3 outline-none">
                <textarea id="train-a" placeholder="Enter Answer" class="w-full bg-white border border-gray-200 p-4 rounded-2xl mb-3 outline-none h-32"></textarea>
                <button onclick="trainAI()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">Seekhao AI ko</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const S_URL = 'https://enstvtympgcnhbbdcdfa.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc3R2dHltcGdjbmhiYmRjZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzIwNjUsImV4cCI6MjA4ODcwODA2NX0.5fhbAcr0sVeH5xZsd6rOXqxGCn1ADIs0U-zW2J9JMeM';
        const G_KEY = 'AIzaSyDQfCt6dIqPokdSivlY2uNre-gkzhxdLqM';
        const T_KEY = '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';

        const supabase = window.supabase.createClient(S_URL, S_KEY);
        let currentUser = null;

        async function login() {
            await supabase.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-box').innerHTML = `<img src="${currentUser.user_metadata.avatar_url}" class="w-10 h-10 rounded-full ring-2 ring-blue-500">`;
                if(currentUser.email === 'pancardonline51@gmail.com') { 
                    document.getElementById('admin-btn').classList.remove('hidden');
                }
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = ''; 
                addMsg(`Welcome back, ${currentUser.user_metadata.full_name}!`, 'ai');
                loadHistory();
            }
        });

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            input.value = '';
            addMsg(text, 'user');

            const thinkingDiv = addMsg(`<span>.</span><span>.</span><span>.</span>`, 'ai');
            thinkingDiv.classList.add('loading-dots');

            try {
                const { data: knowledge } = await supabase.from('ai_knowledge').select('*').ilike('question', `%${text}%`);
                
                let response = "";
                if (knowledge && knowledge.length > 0) {
                    response = knowledge[0].answer;
                } else {
                    let searchContext = "";
                    if(text.length > 5) {
                        try {
                            const sRes = await fetch('https://api.tavily.com/search', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ api_key: T_KEY, query: text })
                            });
                            const sData = await sRes.json();
                            searchContext = JSON.stringify(sData.results);
                        } catch(e) {}
                    }

                    const gRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${G_KEY}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `System: You are MANSIYA-AI, friendly bilingual assistant. Created by Vishal. Context: ${searchContext}. User Question: ${text}.` }] }]
                        })
                    });
                    const gData = await gRes.json();
                    response = gData.candidates[0].content.parts[0].text;
                }

                thinkingDiv.innerHTML = response;
                thinkingDiv.classList.remove('loading-dots');
                saveToDB(text, response);

            } catch (err) {
                thinkingDiv.innerText = "Error Connecting to Server.";
            }
        }

        function addMsg(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-msg self-end max-w-[85%]' : 'ai-msg self-start max-w-[85%]';
            div.innerHTML = `<p class="text-[9px] font-bold uppercase mb-1 ${sender === 'user' ? 'text-blue-100' : 'text-blue-600'}">${sender === 'user' ? 'Aap' : 'Mansiya AI'}</p><p class="text-sm">${text}</p>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.querySelector('.text-sm');
        }

        async function saveToDB(u, a) {
            if(!currentUser) return;
            await supabase.from('messages').insert([{ user_email: currentUser.email, content: u, sender: 'user' }, { user_email: currentUser.email, content: a, sender: 'ai' }]);
        }

        async function loadHistory() {
            const { data } = await supabase.from('messages').select('*').eq('user_email', currentUser.email).order('created_at', { ascending: true }).limit(20);
            if(data) data.forEach(m => addMsg(m.content, m.sender));
        }

        function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('hidden'); }

        async function trainAI() {
            const q = document.getElementById('train-q').value;
            const a = document.getElementById('train-a').value;
            if(!q || !a) return alert("Dono bhariye");
            await supabase.from('ai_knowledge').insert([{ question: q, answer: a }]);
            alert("Memory Updated!");
            toggleAdmin();
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
